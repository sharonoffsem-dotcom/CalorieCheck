services:
  - type: web
    name: calorie-compass
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    disk:
      name: calorie-compass-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 4173
      - key: DATA_DIR
        value: /data
      - key: COOKIE_SECURE
        value: "true"
